<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J24 — GM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#212535;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --text:#e8eaf0;--text2:#8b90a0;--text3:#555c70;
    --accent:#4f7cff;--green:#22c27a;--green-bg:rgba(34,194,122,0.1);
    --red:#f0544f;--red-bg:rgba(240,84,79,0.1);
    --amber:#f0a030;--amber-bg:rgba(240,160,48,0.1);
    --purple:#9b6dff;--purple-bg:rgba(155,109,255,0.1);
    --teal:#20c8c0;--teal-bg:rgba(32,200,192,0.1);
    --orange:#f07030;--orange-bg:rgba(240,112,48,0.1);
    --radius:12px;--radius-sm:8px;--shadow:0 2px 20px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:rgba(13,15,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:56px;gap:0;}
  .nav-logo{font-size:18px;font-weight:600;letter-spacing:-0.5px;margin-right:32px;}
  .nav-logo span{color:var(--accent);}
  .nav-links{display:flex;gap:2px;flex:1;}
  .nav-link{padding:6px 14px;border-radius:var(--radius-sm);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;}
  .nav-link:hover{background:var(--bg3);color:var(--text);}
  .nav-link.active{background:var(--bg4);color:var(--text);}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .nav-pill{font-size:12px;color:var(--text2);padding:4px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);}
  .nav-notif{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;background:var(--bg3);color:var(--text2);border:1px solid var(--border);transition:all .15s;}
  .nav-notif:hover{border-color:var(--border2);color:var(--text);}
  .notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--bg);}
  .nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--red));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;}

  /* LAYOUT */
  .main{padding:28px;max-width:1440px;margin:0 auto;}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;}
  .page-title{font-size:22px;font-weight:600;letter-spacing:-.4px;}
  .page-sub{color:var(--text2);font-size:13px;margin-top:4px;}
  .header-actions{display:flex;gap:10px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
  .btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--border2);color:var(--text);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#6b90ff;}
  .btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,84,79,0.3);}
  .btn-danger:hover{background:rgba(240,84,79,0.2);}
  .btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,194,122,0.3);}
  .btn-success:hover{background:rgba(34,194,122,0.2);}

  /* METRIC GRID */
  .metric-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:28px;}
  .metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:border-color .15s;}
  .metric-card:hover{border-color:var(--border2);}
  .metric-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
  .metric-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .metric-value{font-size:22px;font-weight:600;letter-spacing:-.6px;line-height:1.1;}
  .metric-sub{display:flex;align-items:center;gap:4px;margin-top:5px;font-size:11px;}

  /* SECTION */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-size:15px;font-weight:600;letter-spacing:-.2px;}
  .section-meta{color:var(--text2);font-size:12px;}

  /* INSIGHTS STRIP */
  .insights-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
  .insight-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
  .insight-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
  .insight-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
  .insight-value{font-size:13px;font-weight:600;}
  .insight-sub{font-size:11px;color:var(--text2);margin-top:2px;}

  /* GE CARDS */
  .ge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:32px;}
  .ge-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;}
  .ge-card:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--shadow);transform:translateY(-1px);}
  .ge-card-header{padding:16px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
  .ge-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
  .ge-name{font-size:14px;font-weight:600;}
  .ge-meta{font-size:11px;color:var(--text2);margin-top:2px;}
  .performer-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
  .ge-card-body{padding:14px 18px;}
  .ge-biz-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .gbm-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
  .gbm-value{font-size:15px;font-weight:600;letter-spacing:-.3px;}
  .gbm-delta{font-size:11px;margin-top:1px;}
  .ge-exec-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
  .exec-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;text-align:center;}
  .exec-num{font-size:15px;font-weight:600;}
  .exec-lbl{font-size:10px;color:var(--text3);margin-top:2px;}
  .ge-footer{display:flex;align-items:center;justify-content:space-between;}
  .compliance-bar-wrap{flex:1;margin-right:14px;}
  .compliance-label{font-size:10px;color:var(--text3);margin-bottom:4px;display:flex;justify-content:space-between;}
  .prog-bar{width:100%;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:2px;}
  .stores-badge{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;white-space:nowrap;}

  /* ALERTS */
  .alerts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:28px;}
  .alert-item{display:flex;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid;}
  .alert-danger{background:var(--red-bg);border-color:rgba(240,84,79,.25);}
  .alert-warning{background:var(--amber-bg);border-color:rgba(240,160,48,.25);}
  .alert-info{background:var(--teal-bg);border-color:rgba(32,200,192,.25);}
  .alert-icon{font-size:13px;margin-top:1px;}
  .alert-danger .alert-icon{color:var(--red);}
  .alert-warning .alert-icon{color:var(--amber);}
  .alert-info .alert-icon{color:var(--teal);}
  .alert-title{font-size:12px;font-weight:500;}
  .alert-desc{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:none;align-items:flex-start;justify-content:flex-end;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);width:800px;max-width:100%;height:calc(100vh - 32px);overflow-y:auto;animation:slideIn .2s ease;}
  @keyframes slideIn{from{transform:translateX(24px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:10;}
  .modal-close{width:30px;height:30px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;}
  .modal-close:hover{color:var(--text);border-color:var(--border2);}
  .modal-body{padding:20px 24px;}

  /* TABS */
  .tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;}
  .tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:var(--radius-sm) var(--radius-sm) 0 0;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* STORE MINI CARDS inside GE drill-down */
  .store-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .store-mini{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;transition:all .15s;}
  .store-mini:hover{border-color:var(--accent);}
  .store-mini-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .store-mini-name{font-size:13px;font-weight:600;}
  .store-mini-loc{font-size:10px;color:var(--text3);margin-top:1px;}
  .store-mini-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .smm-item{text-align:center;}
  .smm-val{font-size:13px;font-weight:600;}
  .smm-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}

  /* ACTION CARDS */
  .action-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;}
  .action-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
  .action-title{font-size:13px;font-weight:600;}
  .action-meta-row{font-size:11px;color:var(--text2);}
  .action-desc{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
  .action-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;}
  .status-pending{background:var(--amber-bg);color:var(--amber);}
  .status-inprogress{background:var(--teal-bg);color:var(--teal);}
  .status-completed{background:var(--green-bg);color:var(--green);}
  .status-overdue{background:var(--red-bg);color:var(--red);}
  .status-escalated{background:var(--orange-bg);color:var(--orange);}
  .status-rework{background:var(--purple-bg);color:var(--purple);}
  .priority-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
  .priority-high{background:var(--red);}
  .priority-medium{background:var(--amber);}
  .priority-low{background:var(--green);}

  /* PROOF CARDS */
  .proof-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;}
  .proof-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .proof-title{font-size:13px;font-weight:600;}
  .proof-sub{font-size:11px;color:var(--text2);margin-top:2px;}
  .proof-thumb-row{display:flex;gap:8px;margin-bottom:12px;}
  .proof-thumb{width:72px;height:54px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);flex-shrink:0;}
  .proof-actions{display:flex;gap:8px;}

  /* ANALYTICS */
  .analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .analytics-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;}
  .analytics-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
  .rank-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .rank-num{font-size:11px;color:var(--text3);width:16px;text-align:right;flex-shrink:0;}
  .rank-bar-wrap{flex:1;}
  .rank-label{font-size:12px;margin-bottom:3px;display:flex;justify-content:space-between;}
  .rank-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
  .rank-fill{height:100%;border-radius:2px;}

  /* PERF TABLE */
  .perf-table{width:100%;border-collapse:collapse;}
  .perf-table th{text-align:left;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:8px 10px;border-bottom:1px solid var(--border);}
  .perf-table td{padding:9px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);}
  .perf-table tr:last-child td{border-bottom:none;}
  .perf-table tr:hover td{background:rgba(255,255,255,.02);}

  /* ASSIGN ACTION FORM */
  .form-row{margin-bottom:14px;}
  .form-label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;}
  .form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
  .form-input:focus{border-color:var(--accent);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .level-selector{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .level-opt{padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .15s;background:var(--bg3);}
  .level-opt:hover{border-color:var(--border2);}
  .level-opt.selected{border-color:var(--accent);background:rgba(79,124,255,.1);}
  .level-opt-icon{font-size:18px;margin-bottom:4px;}
  .level-opt-label{font-size:11px;font-weight:500;}
  .level-opt-sub{font-size:10px;color:var(--text3);margin-top:2px;}

  /* NOTIFICATION PANEL */
  .notif-panel{position:fixed;top:60px;right:16px;z-index:150;width:360px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow);display:none;overflow:hidden;animation:dropIn .15s ease;}
  @keyframes dropIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  .notif-panel.open{display:block;}
  .notif-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;}
  .notif-list{max-height:340px;overflow-y:auto;}
  .notif-item{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;cursor:pointer;transition:background .15s;}
  .notif-item:hover{background:var(--bg3);}
  .notif-item:last-child{border-bottom:none;}
  .notif-dot2{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .notif-text{font-size:12px;line-height:1.4;}
  .notif-time{font-size:11px;color:var(--text3);margin-top:2px;}

  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">J24 <span>BI</span></div>
  <div class="nav-links">
    <div class="nav-link active">Regional Overview</div>
    <div class="nav-link">GE Performance</div>
    <div class="nav-link">Action Center</div>
    <div class="nav-link">Analytics</div>
    <div class="nav-link">Proof Review</div>
  </div>
  <div class="nav-right">
    <div class="nav-pill">GM — Priya Nair</div>
    <div class="nav-notif" id="notif-btn" onclick="toggleNotif()">
      <i class="fa fa-bell" style="font-size:14px"></i>
      <div class="notif-dot"></div>
    </div>
    <div class="nav-avatar">PN</div>
  </div>
</nav>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-panel-header">
    <span>Notifications</span>
    <span style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:400;">Mark all read</span>
  </div>
  <div class="notif-list" id="notif-list"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div id="modal-title" style="font-size:16px;font-weight:600;"></div>
        <div id="modal-sub" style="font-size:12px;color:var(--text2);margin-top:3px;"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()"><i class="fa fa-times"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="main">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <div class="page-title">Regional Control Tower</div>
      <div class="page-sub">West Zone &nbsp;·&nbsp; Monday, 19 May 2025 &nbsp;·&nbsp; 4 GEs &nbsp;·&nbsp; 48 Stores</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="openAnalytics()"><i class="fa fa-chart-bar"></i> Analytics</button>
      <button class="btn btn-ghost" onclick="openProofReview()"><i class="fa fa-images"></i> Proof Review</button>
      <button class="btn btn-primary" onclick="openAssignAction()"><i class="fa fa-plus"></i> Assign Action</button>
    </div>
  </div>

  <!-- METRICS -->
  <div class="metric-grid" id="metric-grid"></div>

  <!-- INSIGHTS STRIP -->
  <div class="insights-strip" id="insights-strip"></div>

  <!-- ALERTS -->
  <div class="section-header">
    <div class="section-title">Regional Alerts</div>
    <div class="section-meta" id="alerts-meta"></div>
  </div>
  <div class="alerts-grid" id="alerts-grid"></div>

  <!-- GE PERFORMANCE -->
  <div class="section-header" style="margin-top:8px;">
    <div class="section-title">GE Performance</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <select id="ge-sort" onchange="renderGECards()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 10px;font-size:12px;font-family:inherit;outline:none;">
        <option value="health">Sort: Health Score</option>
        <option value="sales">Sort: Sales</option>
        <option value="completion">Sort: Completion Rate</option>
        <option value="overdue">Sort: Overdue</option>
      </select>
      <div class="section-meta" id="ge-meta"></div>
    </div>
  </div>
  <div class="ge-grid" id="ge-grid"></div>

</div>

<script>
/* ═══════════════════════════════════════════════
   SHARED DATA LAYER — mirrors GE dashboard schema
   In production: import from shared_data.js
═══════════════════════════════════════════════ */
const GM_PROFILE = {
  id:'gm_001', name:'Priya Nair', initials:'PN',
  role:'General Manager', region:'West Zone',
};

/* GE roster — each GE owns a subset of stores */
const GE_DATA = [
  {
    id:'ge_001', name:'Arjun Mehta', initials:'AM',
    empId:'EMP-2241', region:'West Zone — Cluster A',
    avatarGrad:['#4f7cff','#9b6dff'],
    storeCount:6, stores:['S01','S02','S03','S07','S08','S09'],
    totalSales:1475000, salesGrowth:4.8,
    gptTrend:0.6, activeUsers:11840, userGrowth:6,
    avgHealth:73,
    tasksAssigned:64, tasksCompleted:51, overdue:9, escalations:3,
    imageCompliance:78,

/* ═══════ HELPERS ═══════ */
function fmt(n){if(n>=10000000)return '₹'+(n/10000000).toFixed(1)+'Cr';if(n>=100000)return '₹'+(n/100000).toFixed(1)+'L';if(n>=1000)return '₹'+(n/1000).toFixed(0)+'K';return '₹'+n;}
function pct(a,b){return b?Math.round(a/b*100):0;}
function clr(v,hi=true){return v>=80?'var(--green)':v>=60?'var(--amber)':'var(--red)';}
function deltaClr(v){return v>=0?'var(--green)':'var(--red)';}
function statusBadge(s){const m={pending:'status-pending',inprogress:'status-inprogress',completed:'status-completed',overdue:'status-overdue',escalated:'status-escalated',rework:'status-rework'};const l={pending:'Pending',inprogress:'In Progress',completed:'Completed',overdue:'Overdue',escalated:'Escalated',rework:'Rework'};return `<span class="status-badge ${m[s]||'status-pending'}">${l[s]||s}</span>`;}

            <div class="smm-lbl">Health</div>
          </div>
          <div class="smm-item">
            <div class="smm-val" style="color:${s.overdue>0?'var(--red)':'var(--green)'}">${s.pending}</div>
            <div class="smm-lbl">${s.overdue>0?s.overdue+' OVR':'Pending'}</div>
          </div>
        </div>
        <div style="margin-top:8px;">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:3px">
            <span>Compliance</span><span style="color:${clr(s.compliance)}">${s.compliance}%</span>
          </div>
          <div class="prog-bar"><div class="prog-fill" style="width:${s.compliance}%;background:${clr(s.compliance)}"></div></div>
        </div>
      </div>`).join('')}
    </div>
    ${g.categoryGaps.length>0?`
    <div style="margin-top:16px;padding:12px 14px;background:var(--red-bg);border:1px solid rgba(240,84,79,.2);border-radius:var(--radius-sm);">
      <div style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:6px;"><i class="fa fa-triangle-exclamation"></i> &nbsp;Category Gaps</div>
      ${g.categoryGaps.map(c=>`<div style="font-size:12px;color:var(--text2);margin-bottom:3px">${c}</div>`).join('')}
    </div>`:''}
  `;

  /* Actions tab */
  const actionsTab=g.recentActions.length>0?g.recentActions.map(a=>`
    <div class="action-card">
      <div class="action-card-header">
        <div>
          <div class="action-title"><span class="priority-dot priority-${a.priority.toLowerCase()}"></span> &nbsp;${a.title}</div>
          <div class="action-meta-row">${a.assignedTo} &nbsp;·&nbsp; Due ${a.dueDate}</div>
        </div>
        ${statusBadge(a.status)}
      </div>
      <div class="action-desc">${a.desc}</div>
      <div class="action-footer">
        <span style="font-size:11px;color:var(--text3)"><i class="fa fa-flag"></i> ${a.priority} Priority</span>
        ${a.status==='completed'?`<button class="btn btn-success" style="padding:4px 12px;font-size:11px" onclick="openVerifyProof('${a.id}')"><i class="fa fa-check-double"></i> Verify Proof</button>`:''}
        ${a.status==='overdue'||a.status==='escalated'?`<button class="btn btn-danger" style="padding:4px 12px;font-size:11px"><i class="fa fa-arrow-up"></i> Escalate</button>`:''}
        <button class="btn btn-ghost" style="padding:4px 12px;font-size:11px"><i class="fa fa-comment"></i> Comment</button>
      </div>
    </div>`).join('')
    :'<div style="color:var(--text2);text-align:center;padding:30px 0;font-size:13px"><i class="fa fa-check-circle" style="color:var(--green);display:block;font-size:24px;margin-bottom:8px"></i>No active actions</div>';

  /* Escalation log */
  const escalationTab=`
    <div style="margin-bottom:14px;font-size:13px;color:var(--text2)">${g.escalations} escalations recorded</div>
    ${g.escalations>0?[...Array(g.escalations)].slice(0,3).map((_,i)=>`
    <div class="action-card" style="border-color:rgba(240,112,48,.3)">
      <div class="action-card-header">
        <div>
          <div class="action-title" style="color:var(--orange)"><i class="fa fa-circle-exclamation"></i> &nbsp;Escalation #${i+1} — ${g.storeDetails[i]?.name||'Store'}</div>
          <div class="action-meta-row">Escalated ${14-i*3} days ago</div>
        </div>
        <span class="status-badge status-escalated">Escalated</span>
      </div>
      <div class="action-desc">Repeated non-compliance with daily checklist requirements and pending action completion. Third occurrence in 30 days.</div>
      <div class="action-footer">
        <button class="btn btn-ghost" style="padding:4px 12px;font-size:11px"><i class="fa fa-eye"></i> View History</button>
        <button class="btn btn-danger" style="padding:4px 12px;font-size:11px"><i class="fa fa-user-slash"></i> Formal Notice</button>
      </div>
    </div>`).join('')
    :'<div style="text-align:center;padding:30px 0;color:var(--text2);font-size:13px"><i class="fa fa-check-circle" style="color:var(--green);font-size:24px;display:block;margin-bottom:8px"></i>No escalations for this GE</div>'}
  `;

  document.getElementById('modal-body').innerHTML=`
    <div class="tabs">
      <div class="tab active" onclick="switchTab(this,'tab-stores')">Stores (${g.storeCount})</div>
      <div class="tab" onclick="switchTab(this,'tab-actions')">Actions (${g.recentActions.length})</div>
      <div class="tab" onclick="switchTab(this,'tab-escalations')">Escalations (${g.escalations})</div>
    </div>
    <div class="tab-content active" id="tab-stores">${summaryStrip}${storesTab}</div>
    <div class="tab-content" id="tab-actions">${actionsTab}</div>
    <div class="tab-content" id="tab-escalations">${escalationTab}</div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

    <div class="form-row">

        <div class="level-opt selected" id="level-store" onclick="selectLevel('store')">

    </div>
    <div class="form-row">
      <label class="form-label">Description</label>
      <textarea class="form-input" rows="2" style="resize:vertical" placeholder="Describe what needs to be done and expected outcome..."></textarea>

    <div class="form-row" id="assign-target-row">

        ${GE_DATA.flatMap(g=>g.storeDetails.map(s=>`<option value="${s.id}">${s.name} (${g.name})</option>`)).join('')}
      </select>
    </div>
    <div class="form-row">
      <div style="display:flex;gap:12px;align-items:center">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
          <input type="checkbox" checked> <span>Mandatory image proof required</span>
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
          <input type="checkbox"> <span>Attach checklist</span>
        </label>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;padding-top:8px;border-top:1px solid var(--border);margin-top:6px">
      <button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
      <button class="btn btn-primary" onclick="closeModalDirect()"><i class="fa fa-paper-plane"></i> Assign Action</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function selectLevel(l){
  actionLevel=l;
  ['store','ge','region'].forEach(x=>document.getElementById('level-'+x).classList.remove('selected'));
  document.getElementById('level-'+l).classList.add('selected');
  const tr=document.getElementById('assign-target-row');
  const ts=document.getElementById('assign-target');
  if(l==='store'){
    tr.style.display='block';
    ts.innerHTML=GE_DATA.flatMap(g=>g.storeDetails.map(s=>`<option value="${s.id}">${s.name} (${g.name})</option>`)).join('');
  } else if(l==='ge'){
    tr.style.display='block';
    ts.innerHTML=GE_DATA.map(g=>`<option value="${g.id}">${g.name} — ${g.storeCount} stores</option>`).join('');
  } else {
    tr.style.display='none';
  }
}

  const maxH=Math.max(...healths);
  const maxC=Math.max(...completions);
  document.getElementById('modal-body').innerHTML=`
    <div class="analytics-grid">
      <div class="analytics-card">
        <div class="analytics-title">GE Health Score Ranking</div>
        ${GE_DATA.slice().sort((a,b)=>b.avgHealth-a.avgHealth).map((g,i)=>`
        <div class="rank-item">
          <div class="rank-num">#${i+1}</div>
          <div class="rank-bar-wrap">
            <div class="rank-label"><span>${g.name.split(' ')[0]}</span><span style="color:${clr(g.avgHealth)}">${g.avgHealth}/100</span></div>

        <div class="rank-item">

          <tr><td>FNV section empty before 12pm</td><td>5 stores</td><td>Karan, Divya</td><td>8 occurrences</td><td><span class="status-badge status-overdue">Overdue</span></td></tr>
          <tr><td>Missing checklist image uploads</td><td>6 stores</td><td>Karan, Arjun</td><td>21 occurrences</td><td><span class="status-badge status-escalated">Escalated</span></td></tr>

/* ═══════ NOTIFICATIONS ═══════ */
function renderNotifications(){
  document.getElementById('notif-list').innerHTML=GM_NOTIFICATIONS.map(n=>`
    <div class="notif-item">
      <div class="notif-dot2" style="background:${n.type==='danger'?'var(--red)':n.type==='warning'?'var(--amber)':'var(--teal)'}"></div>
      <div>
        <div class="notif-text">${n.text}</div>
        <div class="notif-time">${n.time}</div>
      </div>
    </div>
  `).join('');
}

function toggleNotif(){document.getElementById('notif-panel').classList.toggle('open');}
document.addEventListener('click',function(e){
  if(!document.getElementById('notif-btn').contains(e.target)&&
     !document.getElementById('notif-panel').contains(e.target))
    document.getElementById('notif-panel').classList.remove('open');
});

function switchTab(el,targetId){
  el.closest('.modal-body').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.closest('.modal-body').querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(targetId).classList.add('active');
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');}

/* ═══════ INIT ═══════ */
renderMetrics();
renderInsights();
renderAlerts();
renderGECards();
renderNotifications();
</script>
