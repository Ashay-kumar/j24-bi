<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J24 — GE Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --bg4: #212535;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555c70;
    --accent: #4f7cff;
    --accent2: #2d52cc;
    --green: #22c27a;
    --green-bg: rgba(34,194,122,0.1);
    --red: #f0544f;
    --red-bg: rgba(240,84,79,0.1);
    --amber: #f0a030;
    --amber-bg: rgba(240,160,48,0.1);
    --purple: #9b6dff;
    --purple-bg: rgba(155,109,255,0.1);
    --teal: #20c8c0;
    --teal-bg: rgba(32,200,192,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 16px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }
  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex; align-items: center; gap: 0;
    height: 56px;
  }
  .nav-logo {
    font-size: 18px; font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-right: 32px;
  }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 2px; flex: 1; }
  .nav-link {
    padding: 6px 14px; border-radius: var(--radius-sm);
    color: var(--text2); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; border: none;
    background: none; text-decoration: none;
  }
  .nav-link:hover { background: var(--bg3); color: var(--text); }
  .nav-link.active { background: var(--bg4); color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-notif {
    position: relative; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm); cursor: pointer;
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .nav-notif:hover { border-color: var(--border2); color: var(--text); }
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red); border: 2px solid var(--bg);
  }
  .nav-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  /* MAIN LAYOUT */
  .main { padding: 28px; max-width: 1400px; margin: 0 auto; }
  /* PAGE HEADER */
  .page-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; }
  .page-sub { color: var(--text2); font-size: 13px; margin-top: 4px; }
  .header-actions { display: flex; gap: 10px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; transition: all 0.15s; font-family: inherit;
  }
  .btn-ghost {
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-primary {
    background: var(--accent); color: #fff;
  }
  .btn-primary:hover { background: #6b90ff; }
  /* METRIC GRID */
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .metric-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color 0.15s;
  }
  .metric-card:hover { border-color: var(--border2); }
  .metric-label {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .metric-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .metric-value {
    font-size: 24px; font-weight: 600; letter-spacing: -0.8px;
    color: var(--text); line-height: 1.1;
  }
  .metric-sub {
    display: flex; align-items: center; gap: 5px;
    margin-top: 6px; font-size: 12px;
  }
  .badge-up { color: var(--green); }
  .badge-down { color: var(--red); }
  /* SECTION HEADER */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
  }
  .section-meta { color: var(--text2); font-size: 12px; }
  /* STORE CARDS GRID */
  .stores-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .store-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
  }
  .store-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), var(--shadow);
    transform: translateY(-1px);
  }
  .store-card-header {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .store-name { font-size: 14px; font-weight: 600; }
  .store-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .store-type-badge {
    font-size: 10px; font-weight: 600; padding: 3px 8px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .store-card-body { padding: 14px 18px; }
  .store-metrics {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; margin-bottom: 14px;
  }
  .sm-item { }
  .sm-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .sm-value { font-size: 16px; font-weight: 600; letter-spacing: -0.4px; }
  .sm-delta { font-size: 11px; margin-top: 1px; }
  .store-categories {
    display: flex; gap: 6px; margin-bottom: 14px;
  }
  .cat-chip {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 500;
    background: var(--bg4); color: var(--text2);
    border: 1px solid var(--border);
  }
  .cat-chip.top { background: var(--green-bg); color: var(--green); border-color: rgba(34,194,122,0.2); }
  .cat-chip.low { background: var(--red-bg); color: var(--red); border-color: rgba(240,84,79,0.2); }
  .store-actions-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .action-pills { display: flex; gap: 6px; }
  .action-pill {
    font-size: 11px; font-weight: 500; padding: 3px 8px;
    border-radius: 4px;
  }
  .pill-pending { background: var(--amber-bg); color: var(--amber); }
  .pill-overdue { background: var(--red-bg); color: var(--red); }
  .pill-done { background: var(--green-bg); color: var(--green); }
  .compliance-ring {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
  }
  .ring-wrap { position: relative; width: 32px; height: 32px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 8px; font-weight: 600; color: var(--text);
  }
  /* ALERTS SECTION */
  .alerts-section { margin-bottom: 32px; }
  .alerts-list { display: flex; flex-direction: column; gap: 8px; }
  .alert-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: var(--radius-sm);
    border: 1px solid;
  }
  .alert-danger { background: var(--red-bg); border-color: rgba(240,84,79,0.25); }
  .alert-warning { background: var(--amber-bg); border-color: rgba(240,160,48,0.25); }
  .alert-info { background: var(--teal-bg); border-color: rgba(32,200,192,0.25); }
  .alert-icon { font-size: 14px; margin-top: 1px; }
  .alert-danger .alert-icon { color: var(--red); }
  .alert-warning .alert-icon { color: var(--amber); }
  .alert-info .alert-icon { color: var(--teal); }
  .alert-body { flex: 1; }
  .alert-title { font-size: 13px; font-weight: 500; }
  .alert-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .alert-time { font-size: 11px; color: var(--text3); white-space: nowrap; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    display: none; align-items: flex-start; justify-content: flex-end;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    width: 720px; max-width: 100%;
    height: calc(100vh - 32px);
    overflow-y: auto;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(24px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg2); z-index: 10;
  }
  .modal-close {
    width: 30px; height: 30px; border-radius: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 13px;
    transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--border2); }
  .modal-body { padding: 20px 24px; }
  /* TABS */
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    color: var(--text2); cursor: pointer; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  /* PERF TABLE */
  .perf-table { width: 100%; border-collapse: collapse; }
  .perf-table th {
    text-align: left; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text3); padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .perf-table td {
    padding: 10px 12px; font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .perf-table tr:last-child td { border-bottom: none; }
  .risk-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
  }
  .risk-low { background: var(--green-bg); color: var(--green); }
  .risk-med { background: var(--amber-bg); color: var(--amber); }
  .risk-high { background: var(--red-bg); color: var(--red); }
  /* PROGRESS BAR */
  .prog-bar {
    width: 100%; height: 4px; background: var(--bg4);
    border-radius: 2px; overflow: hidden;
  }
  .prog-fill { height: 100%; border-radius: 2px; }
  /* ACTIONS */
  .action-cards { display: flex; flex-direction: column; gap: 10px; }
  .action-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
  }
  .action-card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 8px;
  }
  .action-title { font-size: 13px; font-weight: 600; }
  .action-assignee { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .status-pending { background: var(--amber-bg); color: var(--amber); }
  .status-inprogress { background: var(--teal-bg); color: var(--teal); }
  .status-completed { background: var(--green-bg); color: var(--green); }
  .status-escalated { background: var(--red-bg); color: var(--red); }
  .action-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .action-meta {
    display: flex; align-items: center; gap: 12px;
    font-size: 11px; color: var(--text3);
  }
  .action-meta span { display: flex; align-items: center; gap: 4px; }
  .priority-dot {
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block;
  }
  .priority-high { background: var(--red); }
  .priority-med { background: var(--amber); }
  .priority-low { background: var(--green); }
  .upload-btn {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 10px; padding: 5px 12px; border-radius: 6px;
    font-size: 11px; font-weight: 500; cursor: pointer;
    background: var(--bg4); border: 1px solid var(--border);
    color: var(--text2); transition: all 0.15s; font-family: inherit;
  }
  .upload-btn:hover { border-color: var(--border2); color: var(--text); }
  /* CHECKLIST */
  .checklist-section { margin-bottom: 16px; }
  .checklist-group-title {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text3); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .checklist-items { display: flex; flex-direction: column; gap: 4px; }
  .check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: var(--radius-sm);
    background: var(--bg3); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .check-item:hover { border-color: var(--border2); }
  .check-item.checked { opacity: 0.6; }
  .check-box {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--border2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-size: 10px;
  }
  .check-item.checked .check-box {
    background: var(--green); border-color: var(--green); color: #fff;
  }
  .check-label { font-size: 13px; flex: 1; }
  .check-item.checked .check-label { text-decoration: line-through; color: var(--text2); }
  /* HEALTH SCORE */
  .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .health-item { }
  .health-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .health-score { font-size: 12px; font-weight: 600; }
  /* INVENTORY SIGNALS */
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .inv-item {
    padding: 10px 12px; border-radius: var(--radius-sm);
    background: var(--bg3); border: 1px solid var(--border);
  }
  .inv-sku { font-size: 12px; font-weight: 500; }
  .inv-status { font-size: 11px; margin-top: 2px; }
  /* MINI BAR CHART */
  .mini-bars { display: flex; align-items: flex-end; gap: 3px; height: 40px; margin: 10px 0; }
  .mini-bar {
    flex: 1; border-radius: 2px 2px 0 0;
    background: var(--accent);
    opacity: 0.7; transition: opacity 0.15s;
  }
  .mini-bar:hover { opacity: 1; }
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  /* NOTIFICATION PANEL */
  .notif-panel {
    position: fixed; top: 60px; right: 16px; z-index: 150;
    width: 360px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius); box-shadow: var(--shadow);
    display: none; overflow: hidden;
    animation: dropIn 0.15s ease;
  }
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .notif-panel.open { display: block; }
  .notif-panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 600;
  }
  .notif-list { max-height: 320px; overflow-y: auto; }
  .notif-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; cursor: pointer; transition: background 0.15s;
  }
  .notif-item:hover { background: var(--bg3); }
  .notif-item:last-child { border-bottom: none; }
  .notif-dot2 {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  }
  .notif-body { flex: 1; }
  .notif-text { font-size: 12px; line-height: 1.4; }
  .notif-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
  /* DAILY TARGET PROGRESS */
  .target-row {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;
    margin-bottom: 28px;
  }
  .target-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
  }
  .target-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
  .target-num {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .target-current { font-size: 20px; font-weight: 600; }
  .target-goal { font-size: 13px; color: var(--text2); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">J24 <span>BI</span></div>
  <div class="nav-links">
    <div class="nav-link active">Portfolio</div>
    <div class="nav-link">Actions</div>
    <div class="nav-link">Reports</div>
    <div class="nav-link">Checklist</div>
  </div>
  <div class="nav-right">
    <div style="font-size:12px;color:var(--text2);padding:4px 12px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);">
      GE — Arjun Mehta
    </div>
    <div class="nav-notif" id="notif-btn" onclick="toggleNotif()">
      <i class="fa fa-bell" style="font-size:14px"></i>
      <div class="notif-dot"></div>
    </div>
    <div class="nav-avatar">AM</div>
  </div>
</nav>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-panel-header">
    <span>Notifications</span>
    <span style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:400;">Mark all read</span>
  </div>
  <div class="notif-list" id="notif-list"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title" style="font-size:16px;font-weight:600;"></div>
        <div id="modal-sub" style="font-size:12px;color:var(--text2);margin-top:3px;"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()"><i class="fa fa-times"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="main">
  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <div class="page-title">Good morning, Arjun 👋</div>
      <div class="page-sub">Monday, 19 May 2025 &nbsp;·&nbsp; 12 Stores under management</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost"><i class="fa fa-download"></i> Export</button>
      <button class="btn btn-primary" onclick="openAddAction()"><i class="fa fa-plus"></i> New Action</button>
    </div>
  </div>

  <!-- PORTFOLIO METRICS -->
  <div class="metric-grid" id="metric-grid"></div>

  <!-- DAILY TARGETS -->
  <div class="target-row" id="target-row"></div>

  <!-- ALERTS -->
  <div class="alerts-section">
    <div class="section-header">
      <div class="section-title">Active Alerts</div>
      <div class="section-meta" id="alerts-meta"></div>
    </div>
    <div class="alerts-list" id="alerts-list"></div>

  const metrics = [

  const r = 13; const c = 2*Math.PI*r;
  const fill = c - (pct/100)*c;
  const col = pct >= 85 ? '#22c27a' : pct >= 65 ? '#f0a030' : '#f0544f';
  return `<div class="ring-wrap">
    <svg width="32" height="32" viewBox="0 0 32 32">
      <circle cx="16" cy="16" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2.5"/>
      <circle cx="16" cy="16" r="${r}" fill="none" stroke="${col}" stroke-width="2.5"
        stroke-dasharray="${c}" stroke-dashoffset="${fill}" stroke-linecap="round"/>
    </svg>
  </div>`;
}

// ─── STORE MODAL ───
let checklistState = {};

function openStore(id) {
  const s = STORES_DATA.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('modal-title').textContent = s.name;
  document.getElementById('modal-sub').innerHTML = `<i class="fa fa-location-dot" style="font-size:10px"></i> ${s.location} &nbsp;·&nbsp; ${s.id} &nbsp;·&nbsp; Health Score: <strong style="color:${s.healthScore>=80?'var(--green)':s.healthScore>=60?'var(--amber)':'var(--red)'}">${s.healthScore}/100</strong>`;

  const tabsHtml = `
    <div class="tabs">
      <div class="tab active" onclick="switchTab(this,'tab-perf')">Performance</div>
      <div class="tab" onclick="switchTab(this,'tab-actions')">Actions (${s.actions.length})</div>
      <div class="tab" onclick="switchTab(this,'tab-checklist')">Checklist</div>
      <div class="tab" onclick="switchTab(this,'tab-inventory')">Inventory</div>
      <div class="tab" onclick="switchTab(this,'tab-health')">Health Score</div>
    </div>
  `;

  // Performance tab
  const tabPerf = `<div class="tab-content active" id="tab-perf">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Monthly Sales</div>
        <div style="font-size:22px;font-weight:600">${fmt(s.sales)}</div>
        <div style="font-size:12px;color:${s.salesGrowth>=0?'var(--green)':'var(--red)'};margin-top:3px">${s.salesGrowth>=0?'↑':'↓'} ${Math.abs(s.salesGrowth)}% vs last month</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Active Users</div>
        <div style="font-size:22px;font-weight:600">${s.activeUsers.toLocaleString()}</div>
        <div style="font-size:12px;color:${s.userGrowth>=0?'var(--green)':'var(--red)'};margin-top:3px">${s.userGrowth>=0?'↑':'↓'} ${Math.abs(s.userGrowth)}% MoM</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">GPT Trend</div>
        <div style="font-size:22px;font-weight:600;color:${s.gptTrend>=0?'var(--green)':'var(--red)'}">${s.gptTrend>=0?'+':''}${s.gptTrend}%</div>
        <div style="font-size:12px;color:var(--text3);margin-top:3px">vs previous month</div>
      </div>
    </div>
    <div style="margin-bottom:18px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">7-Day Sales Trend (₹L)</div>
      <div class="mini-bars">
        ${s.weekSales.map(v=>`<div class="mini-bar" title="₹${v}L" style="height:${Math.round((v/Math.max(...s.weekSales))*100)}%;background:var(--accent);opacity:0.7"></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px">
        ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<span>${d}</span>`).join('')}
      </div>
    </div>
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">Category Performance</div>
    ${s.categories.length > 0 ? `
    <table class="perf-table">
      <thead><tr><th>Category</th><th>Sales</th><th>Growth</th><th>Availability</th><th>Risk</th></tr></thead>
      <tbody>
        ${s.categories.map(c=>`
        <tr>
          <td style="font-weight:500">${c.name}</td>
          <td>${fmt(c.sales)}</td>
          <td style="color:${c.growth>=0?'var(--green)':'var(--red)'}">${c.growth>=0?'+':''}${c.growth}%</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="prog-bar" style="width:80px"><div class="prog-fill" style="width:${c.avail}%;background:${c.avail>=85?'var(--green)':c.avail>=70?'var(--amber)':'var(--red)'}"></div></div>
              <span style="font-size:12px">${c.avail}%</span>
            </div>
          </td>
          <td><span class="risk-badge risk-${c.risk.toLowerCase()}">${c.risk}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center">Category data not available</div>'}
  </div>`;

  // Actions tab
  const tabActions = `<div class="tab-content" id="tab-actions">
    <div class="action-cards">
      ${s.actions.length > 0 ? s.actions.map(a=>`
      <div class="action-card">
        <div class="action-card-header">
          <div>
            <div class="action-title">
              <span class="priority-dot priority-${a.priority.toLowerCase()}"></span>
              &nbsp;${a.title}
            </div>
            <div class="action-assignee">Assigned by ${a.assignedBy}</div>
          </div>
          <span class="status-badge status-${a.status}">${a.status === 'inprogress' ? 'In Progress' : a.status.charAt(0).toUpperCase()+a.status.slice(1)}</span>
        </div>
        <div class="action-desc">${a.desc}</div>
        <div class="action-meta">
          <span><i class="fa fa-calendar"></i> Due: ${a.dueDate}</span>
          <span><i class="fa fa-flag"></i> ${a.priority} Priority</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="upload-btn"><i class="fa fa-image"></i> Upload Proof</button>
          <button class="upload-btn"><i class="fa fa-comment"></i> Add Comment</button>
          ${a.status !== 'completed' ? `<button class="upload-btn" style="color:var(--green);border-color:rgba(34,194,122,0.3)"><i class="fa fa-check"></i> Mark Complete</button>` : ''}
          ${a.status === 'pending' || a.status === 'inprogress' ? `<button class="upload-btn" style="color:var(--red);border-color:rgba(240,84,79,0.2)"><i class="fa fa-arrow-up"></i> Escalate</button>` : ''}
        </div>
      </div>`).join('') : '<div style="color:var(--text2);text-align:center;padding:40px 0;font-size:13px"><i class="fa fa-check-circle" style="color:var(--green);font-size:24px;display:block;margin-bottom:10px"></i>No actions pending for this store</div>'}
    </div>
  </div>`;

  // Checklist tab
  const storeCheckKey = 'checklist_' + id;
  if(!checklistState[id]) checklistState[id] = {};
  const tabChecklist = `<div class="tab-content" id="tab-checklist">
    ${Object.entries(CHECKLIST_DATA).map(([group, items])=>`
    <div class="checklist-section">
      <div class="checklist-group-title"><i class="fa fa-clipboard-list"></i> ${group}</div>
      <div class="checklist-items">
        ${items.map((item,idx)=>{
          const key = group+'_'+idx;
          const checked = checklistState[id][key] || false;
          return `<div class="check-item ${checked?'checked':''}" onclick="toggleCheck('${id}','${key}',this)">
            <div class="check-box">${checked?'<i class="fa fa-check"></i>':''}</div>
            <span class="check-label">${item}</span>
            <button class="upload-btn" onclick="event.stopPropagation()" style="margin:0;padding:3px 8px;font-size:10px"><i class="fa fa-camera"></i></button>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}
  </div>`;

  // Inventory tab
  const tabInv = `<div class="tab-content" id="tab-inventory">
    ${s.inventory.length > 0 ? `
    <div style="font-size:13px;font-weight:500;margin-bottom:14px;color:var(--text2)">${s.inventory.length} signals detected</div>
    <div class="inv-grid">
      ${s.inventory.map(i=>`
      <div class="inv-item">
        <div class="inv-sku">${i.sku}</div>
        <div class="inv-status">
          <span class="risk-badge risk-${i.risk}" style="font-size:10px">${i.issue}</span>
        </div>
      </div>`).join('')}
    </div>` : '<div style="color:var(--text2);text-align:center;padding:40px 0;font-size:13px">No inventory signals for this store</div>'}
  </div>`;

  // Health Score tab
  const weights = [
    { param: 'Sales Growth', weight: 25, score: Math.max(0,Math.min(100, 50 + s.salesGrowth * 8)) },
    { param: 'Task Completion', weight: 20, score: s.completed/(s.completed+s.pending+s.overdue)*100 || 0 },
    { param: 'Inventory Availability', weight: 20, score: s.categories.length ? s.categories.reduce((acc,c)=>acc+c.avail,0)/s.categories.length : 75 },
    { param: 'Store Cleanliness', weight: 15, score: s.compliance },
    { param: 'Image Compliance', weight: 10, score: s.compliance * 0.95 },
    { param: 'Customer Readiness', weight: 10, score: Math.max(0,Math.min(100,50+s.userGrowth*4)) },
  ];
  const tabHealth = `<div class="tab-content" id="tab-health">
    <div style="text-align:center;padding:20px 0 24px">
      <div style="font-size:48px;font-weight:700;color:${s.healthScore>=80?'var(--green)':s.healthScore>=60?'var(--amber)':'var(--red)'};letter-spacing:-2px">${s.healthScore}</div>
      <div style="font-size:14px;color:var(--text2);margin-top:4px">/ 100 — Overall Health Score</div>
    </div>
    <div class="health-grid">
      ${weights.map(w=>`
      <div class="health-item">
        <div class="health-label">
          <span>${w.param}</span>
          <span class="health-score">${Math.round(w.score)}% <span style="color:var(--text3);font-weight:400">(${w.weight}%)</span></span>
        </div>
        <div class="prog-bar">
          <div class="prog-fill" style="width:${Math.round(w.score)}%;background:${w.score>=80?'var(--green)':w.score>=60?'var(--amber)':'var(--red)'}"></div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;

  document.getElementById('modal-body').innerHTML = tabsHtml + tabPerf + tabActions + tabChecklist + tabInv + tabHealth;
  document.getElementById('modal-overlay').classList.add('open');
}

function toggleCheck(storeId, key, el) {
  checklistState[storeId][key] = !checklistState[storeId][key];
  el.classList.toggle('checked');
  el.querySelector('.check-box').innerHTML = checklistState[storeId][key] ? '<i class="fa fa-check"></i>' : '';
}

function switchTab(el, targetId) {
  el.closest('.modal-body').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.closest('.modal-body').querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(targetId).classList.add('active');
}

function closeModal(e) {
  if(e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function toggleNotif() {
  document.getElementById('notif-panel').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if(!document.getElementById('notif-btn').contains(e.target) &&
     !document.getElementById('notif-panel').contains(e.target)) {
    document.getElementById('notif-panel').classList.remove('open');
  }
});

  document.getElementById('modal-sub').textContent = 'Assign a task to one or more stores';
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px">Action Title</label>
        <input placeholder="e.g. Improve dairy visibility" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;outline:none">
      </div>
      <div>
        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px">Description</label>

      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div>
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px">Priority</label>
          <select style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;outline:none">
            <option>High</option><option>Medium</option><option>Low</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px">Due Date</label>
          <input type="date" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;outline:none">
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px">Assign to Stores</label>
        <select multiple style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;height:100px">
          ${STORES_DATA.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;padding-top:8px">
        <button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
        <button class="btn btn-primary" onclick="closeModalDirect()"><i class="fa fa-check"></i> Create Action</button>

// ─── INIT ───
renderMetrics();
renderTargets();
renderAlerts();
renderNotifications();
renderStores();
</script>
</body>
